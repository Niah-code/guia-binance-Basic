<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenida | Guía Binance</title>
    <style>
        body { font-family: 'Lora', serif; background: #FDFBF7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #D4AF37; border-radius: 8px; }
        button { background: #0B1226; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>¡Bienvenida!</h1>
        <p>Ingresa tu nombre para personalizar tu guía:</p>
        <input type="text" id="userName" placeholder="Tu nombre aquí...">
        <button onclick="guardarYIr()">Entrar a la Guía</button>
    </div>

    <script>
        function guardarYIr() {
            const nombre = document.getElementById('userName').value;
            if(nombre) {
                localStorage.setItem('user_name', nombre); // Guarda el nombre
                window.location.href = "index.html"; // Te manda a la guía
            } else {
                alert("Escribe tu nombre primero");
            }
        }
    </script>
</body>
</html>
